<div id="ranks">
<style>
  #ranks{background:#0E0E13;padding:22px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  #ranks *{box-sizing:border-box}
  .hint{text-align:center;color:#6A6A78;font-size:12px;margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:680px;margin:0 auto}
  .card{background:#1B1C24;border-radius:18px;padding:18px 10px 16px;text-align:center}
  .card.last{grid-column:2}
  .stage{height:120px;display:flex;align-items:center;justify-content:center;overflow:visible}
  .stage svg{width:120px;height:120px;overflow:visible}
  .nm{color:#F4F4F6;font-size:16px;font-weight:500;margin-top:6px}
  .st{color:#8C8C97;font-size:11px;margin-top:3px}
  @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr)}.card.last{grid-column:auto}}

  /* ====== DELULU: ragdoll noodle flop — floppy boneless wobble ====== */
  .delulu{animation:flop 1.4s ease-in-out infinite;transform-origin:0px 20px}
  @keyframes flop{0%,100%{transform:rotate(-18deg) skewX(8deg)}25%{transform:rotate(14deg) skewX(-10deg) scaleY(.85)}50%{transform:rotate(-10deg) skewX(12deg) scaleY(1.15)}75%{transform:rotate(16deg) skewX(-8deg)}}

  /* ====== MEWING: vibrate buildup then SPROING launch ====== */
  .mewing{animation:sproing 2s cubic-bezier(.3,0,.2,1) infinite;transform-origin:0px 18px}
  @keyframes sproing{0%,40%{transform:translateY(0) scaleY(1)}10%{transform:translate(1px) }20%{transform:translate(-1px)}30%{transform:translate(1px)}50%{transform:translateY(4px) scaleY(.6) scaleX(1.3)}62%{transform:translateY(-34px) scaleY(1.4) scaleX(.7)}80%{transform:translateY(0) scaleY(.9) scaleX(1.1)}90%{transform:scaleY(1.05)}100%{transform:translateY(0) scaleY(1)}}

  /* ====== RIZZ: griddy-style leg switch + arm swing, hips out ====== */
  .rizz{animation:griddy .55s steps(2,end) infinite}
  @keyframes griddy{0%{transform:rotate(-7deg) translateX(-3px)}100%{transform:rotate(7deg) translateX(3px)}}
  .rizz-spark{animation:sparkpop .55s ease-out infinite}
  @keyframes sparkpop{0%,60%{opacity:0;transform:scale(.4)}70%{opacity:1;transform:scale(1.5)}100%{opacity:0}}

  /* ====== GIGACHAD: over-inflate flex, body balloons then deflates ====== */
  .giga{animation:swole 1.6s cubic-bezier(.4,0,.3,1) infinite;transform-origin:center 60%}
  @keyframes swole{0%,100%{transform:scale(1)}35%{transform:scale(1.05)}55%{transform:scaleX(1.45) scaleY(1.3)}62%{transform:scaleX(1.5) scaleY(1.32) rotate(-2deg)}70%{transform:scaleX(1.5) scaleY(1.32) rotate(2deg)}85%{transform:scale(.92)}}
  .giga-sweat{animation:sweat 1.6s ease-in infinite}
  @keyframes sweat{0%,55%{opacity:0;transform:translate(0,0)}62%{opacity:1}100%{opacity:0;transform:translate(8px,18px)}}

  /* ====== AURA FARMER: full 360 floss/twirl spin with trailing sparkles ====== */
  .farmer{animation:twirl 1.3s cubic-bezier(.5,0,.5,1) infinite;transform-origin:0px 5px}
  @keyframes twirl{0%{transform:rotate(0) scaleX(1)}45%{transform:rotate(180deg) scaleX(.7)}55%{transform:rotate(200deg)}100%{transform:rotate(360deg) scaleX(1)}}
  .farmer-trail{animation:trail 1.3s linear infinite}
  @keyframes trail{0%,100%{opacity:0}50%{opacity:.9}}

  /* ====== MAIN CHARACTER: dramatic hair-flip lean-back + sparkle sweep ====== */
  .mc{animation:diva 1.8s cubic-bezier(.5,0,.3,1) infinite;transform-origin:0px 38px}
  @keyframes diva{0%,100%{transform:rotate(0)}20%{transform:rotate(-4deg)}40%{transform:rotate(28deg) translateX(8px)}55%{transform:rotate(30deg)}75%{transform:rotate(-6deg)}}
  .mc-beam{animation:divabeam 1.8s ease-in-out infinite;transform-origin:top center}
  @keyframes divabeam{0%,30%,100%{opacity:.15;transform:scaleX(.9)}45%{opacity:.55;transform:scaleX(1.1)}}

  /* ====== GOATED: spam backflip + confetti explosion, never not winning ====== */
  .goat{animation:backflip 1.5s cubic-bezier(.3,0,.4,1) infinite;transform-origin:0px 8px}
  @keyframes backflip{0%{transform:translateY(3px) rotate(0)}20%{transform:translateY(8px) scaleY(.85)}45%{transform:translateY(-22px) rotate(-200deg)}70%{transform:translateY(-4px) rotate(-360deg)}85%{transform:translateY(4px) rotate(-360deg) scaleY(.92)}100%{transform:translateY(3px) rotate(-360deg)}}
  .goat-conf{animation:confburst 1.5s ease-out infinite}
  @keyframes confburst{0%,40%{opacity:0;transform:scale(.2)}50%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.8)}}

  @media(prefers-reduced-motion:reduce){
    .delulu,.mewing,.rizz,.rizz-spark,.giga,.giga-sweat,.farmer,.farmer-trail,.mc,.mc-beam,.goat,.goat-conf{animation:none;opacity:1}
  }
</style>
